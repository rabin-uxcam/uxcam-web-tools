<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Canvas Session Player</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, monospace; background: #1a1a2e; color: #e0e0e0; height: 100vh; display: flex; flex-direction: column; }

/* Tab bar */
.tab-bar { display: flex; background: #16213e; border-bottom: 2px solid #0f3460; }
.tab { padding: 8px 24px; font-size: 13px; cursor: pointer; color: #888; border-bottom: 2px solid transparent; margin-bottom: -2px; user-select: none; }
.tab:hover { color: #bbb; }
.tab.active { color: #5dade2; border-bottom-color: #5dade2; }
.tab-panel { display: none; flex: 1; flex-direction: column; overflow: hidden; }
.tab-panel.active { display: flex; }

/* Header */
.header { display: flex; align-items: center; gap: 10px; padding: 10px 16px; background: #16213e; border-bottom: 1px solid #0f3460; flex-wrap: wrap; }
.header label { font-size: 13px; color: #aaa; }
.header select, .header input { background: #1a1a2e; color: #e0e0e0; border: 1px solid #0f3460; border-radius: 4px; padding: 6px 10px; font-size: 13px; }
.header select { min-width: 200px; }
.header input { width: 280px; }
.header button { background: #0f3460; color: #e0e0e0; border: none; border-radius: 4px; padding: 6px 16px; font-size: 13px; cursor: pointer; }
.header button:hover { background: #1a5276; }
.header button:disabled { opacity: 0.5; cursor: not-allowed; }
.header .status { margin-left: auto; font-size: 12px; color: #888; }

/* Main area */
.main { flex: 1; display: flex; overflow: hidden; }

/* Video area */
.canvas-wrap { flex: 1; position: relative; display: flex; align-items: center; justify-content: center; background: #111; overflow: hidden; }
#playerVideo { max-width: 100%; max-height: 100%; object-fit: contain; background: #000; }
.click-dot { position: absolute; width: 20px; height: 20px; border-radius: 50%; background: rgba(255, 80, 80, 0.8); border: 2px solid #ff5050; pointer-events: none; transform: translate(-50%, -50%); z-index: 2; }
.click-dot.current { animation: clickPulse 0.5s ease-out forwards; }
.click-dot.trail { opacity: 0.4; width: 12px; height: 12px; background: rgba(255, 150, 80, 0.5); border-color: #ff9650; }
@keyframes clickPulse {
  0% { transform: translate(-50%, -50%) scale(0.5); opacity: 1; }
  100% { transform: translate(-50%, -50%) scale(2.2); opacity: 0; }
}
.click-trail-svg { position: absolute; inset: 0; pointer-events: none; z-index: 1; }

/* Screen banner */
.screen-banner { position: absolute; top: 10px; left: 10px; background: rgba(15, 52, 96, 0.85); padding: 6px 14px; border-radius: 4px; font-size: 13px; font-weight: 600; max-width: 60%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

/* Sidebar */
.sidebar { width: 320px; display: flex; flex-direction: column; border-left: 1px solid #0f3460; background: #16213e; }
.sidebar-title { padding: 10px 14px; font-size: 12px; font-weight: 600; text-transform: uppercase; color: #888; border-bottom: 1px solid #0f3460; }
.event-log { flex: 1; overflow-y: auto; font-size: 12px; }
.event-item { padding: 6px 14px; border-bottom: 1px solid #0f3460; display: flex; gap: 8px; }
.event-item.active { background: rgba(255, 200, 50, 0.1); }
.event-item .time { color: #5dade2; min-width: 50px; }
.event-item .screen { color: #888; font-size: 11px; }
.event-item .name { color: #e0e0e0; }
.event-item .name.internal { color: #888; }

/* Controls */
.controls { background: #16213e; border-top: 1px solid #0f3460; padding: 10px 16px; }
.controls-row { display: flex; align-items: center; gap: 12px; }
.controls button { background: none; border: 1px solid #0f3460; color: #e0e0e0; border-radius: 4px; padding: 6px 12px; cursor: pointer; font-size: 14px; }
.controls button:hover { background: #0f3460; }
.controls .time-display { font-size: 13px; color: #aaa; min-width: 120px; text-align: center; }
.controls .speed { font-size: 12px; color: #5dade2; cursor: pointer; padding: 4px 8px; border-radius: 3px; }
.controls .speed:hover { background: #0f3460; }
.controls .speed.active { background: #0f3460; font-weight: 600; }

/* Timeline */
.timeline-wrap { margin-top: 8px; position: relative; height: 28px; cursor: pointer; }
.timeline-bar { position: absolute; top: 10px; left: 0; right: 0; height: 6px; background: #0f3460; border-radius: 3px; }
.timeline-progress { position: absolute; top: 10px; left: 0; height: 6px; background: #5dade2; border-radius: 3px; }
.timeline-thumb { position: absolute; top: 6px; width: 14px; height: 14px; background: #e0e0e0; border-radius: 50%; transform: translateX(-50%); }
.timeline-marker { position: absolute; top: 0; width: 2px; height: 8px; background: #f39c12; transform: translateX(-50%); border-radius: 1px; }
.timeline-marker.screen-marker { background: #2ecc71; height: 8px; top: 18px; }
.timeline-marker:hover::after { content: attr(data-label); position: absolute; bottom: 12px; left: 50%; transform: translateX(-50%); background: #333; color: #fff; padding: 2px 6px; border-radius: 3px; font-size: 10px; white-space: nowrap; z-index: 10; }
.timeline-marker.screen-marker:hover::after { bottom: auto; top: 12px; }

/* Loading overlay */
.loading { position: absolute; inset: 0; background: rgba(0,0,0,0.8); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; z-index: 100; }
.loading.hidden { display: none; }
.loading .spinner { width: 40px; height: 40px; border: 3px solid #333; border-top-color: #5dade2; border-radius: 50%; animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.loading .progress-text { font-size: 13px; color: #aaa; }

/* ─── Benchmark panel ────────────────────────────────────────────────────── */
.bench-content { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
.bench-loading { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; padding: 40px; }
.bench-loading.hidden { display: none; }
.bench-loading .spinner { width: 40px; height: 40px; border: 3px solid #333; border-top-color: #5dade2; border-radius: 50%; animation: spin 0.8s linear infinite; }
.bench-results { flex: 1; overflow-y: auto; padding: 16px; }
.bench-results:empty::after { content: 'Select a session and click "Run Benchmark" to compare strategies.'; color: #555; font-size: 13px; }
.bench-table { width: 100%; border-collapse: collapse; font-size: 13px; }
.bench-table th { text-align: left; padding: 10px 12px; background: #0f3460; color: #aaa; font-weight: 600; text-transform: uppercase; font-size: 11px; position: sticky; top: 0; }
.bench-table td { padding: 10px 12px; border-bottom: 1px solid #0f3460; vertical-align: top; }
.bench-table tr.best td { background: rgba(46, 204, 113, 0.08); }
.bench-table .strategy-name { font-weight: 600; color: #e0e0e0; }
.bench-table .strategy-desc { color: #888; font-size: 11px; margin-top: 2px; }
.bench-table .size-badge { display: inline-block; padding: 2px 8px; border-radius: 3px; font-size: 11px; font-weight: 600; }
.bench-table .size-badge.smallest { background: rgba(46, 204, 113, 0.2); color: #2ecc71; }
.bench-video-cell video { max-width: 280px; max-height: 160px; border-radius: 4px; cursor: pointer; background: #000; }
.bench-error { color: #e74c3c; font-size: 12px; }
</style>
</head>
<body>

<!-- Tab bar -->
<div class="tab-bar">
	<div class="tab active" data-tab="player">Player</div>
	<div class="tab" data-tab="bin-processor">Bin Processor</div>
	<div class="tab" data-tab="benchmark">Benchmark</div>
</div>

<!-- ═══════════════════════════════════════════════════════════════════════ -->
<!-- Player tab -->
<!-- ═══════════════════════════════════════════════════════════════════════ -->
<div class="tab-panel active" id="panel-player">

<div class="header">

	<label>Session:</label>

<div class="tab-panel" id="panel-bin-processor">

<div class="header">
	<label>MinIO:</label>
	<input type="text" id="binMinioUrl" value="http://localhost:9000" placeholder="MinIO endpoint">
	<button id="binListBtn">List</button>
	<label>Session:</label>

</div>

<div class="main">

<script>
// ═══════════════════════════════════════════════════════════════════════════
// Tab switching
// ═══════════════════════════════════════════════════════════════════════════

document.querySelectorAll('.tab').forEach(tab => {
	tab.addEventListener('click', () => {
		document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
		document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
		tab.classList.add('active');
		document.getElementById(`panel-${tab.dataset.tab}`).classList.add('active');
	});
});

// ═══════════════════════════════════════════════════════════════════════════
// Player tab — State
// ═══════════════════════════════════════════════════════════════════════════

let dataJson = null;
let screenTimeline = [];	// st[]
let events = [];		// evt[]
let totalTimeMs = 0;
let firstFrameOffsetSec = 0;	// session time of first canvas frame
let playbackSpeed = 1;
let rafId = null;

const video = document.getElementById('playerVideo');
const MINIO_BUCKET = 'uxcam-sessions';

const isDevServer = location.protocol.startsWith('http');

// ─── MinIO helpers (proxy through server to avoid CORS) ─────────────────────

function minioBase(urlInputId) {
	const raw = document.getElementById(urlInputId || 'minioUrl').value.replace(/\/+$/, '');
	if (!isDevServer) return raw;
	try {
		const u = new URL(raw);
		return `/minio/${u.host}`;
	} catch {
		return raw;
	}
}

async function minioList(prefix, delimiter, urlInputId) {
	let url = `${minioBase(urlInputId)}/${MINIO_BUCKET}?list-type=2&prefix=${encodeURIComponent(prefix)}`;
	if (delimiter) url += `&delimiter=${encodeURIComponent(delimiter)}`;
	const resp = await fetch(url);
	const text = await resp.text();
	const parser = new DOMParser();
	return parser.parseFromString(text, 'application/xml');
}

async function minioGet(key, urlInputId) {
	const resp = await fetch(`${minioBase(urlInputId)}/${MINIO_BUCKET}/${key}`);
	if (!resp.ok) throw new Error(`Failed to fetch ${key}: ${resp.status}`);
	return resp;
}

// ─── List everything from MinIO ──────────────────────────────────────────────

document.getElementById('listBtn').addEventListener('click', listAll);

async function listAll() {
	const sessionSelect = document.getElementById('sessionSelect');
	const dataSelect = document.getElementById('dataSelect');
	sessionSelect.innerHTML = '<option value="">Loading...</option>';
	dataSelect.innerHTML = '<option value="">Loading...</option>';
	setStatus('Listing MinIO contents...');

	try {
		const canvasXml = await minioList('sessions/canvas/', '/');
		const prefixes = [...canvasXml.querySelectorAll('CommonPrefixes > Prefix')];
		sessionSelect.innerHTML = '';

		if (prefixes.length === 0) {
			sessionSelect.innerHTML = '<option value="">No sessions found</option>';
		} else {
			prefixes.forEach(p => {
				const sid = p.textContent.replace('sessions/canvas/', '').replace(/\/$/, '');
				const opt = document.createElement('option');
				opt.value = sid;
				opt.textContent = sid;
				sessionSelect.appendChild(opt);
			});
			sessionSelect.selectedIndex = sessionSelect.options.length - 1;
		}

		const dataXml = await minioList('sessions/data/', null);
		const allKeys = [...dataXml.querySelectorAll('Contents > Key')].map(k => k.textContent);
		const dataFiles = allKeys.filter(k => k.endsWith('.json') || k.endsWith('.json.gz'));
		dataSelect.innerHTML = '';

		if (dataFiles.length === 0) {
			dataSelect.innerHTML = '<option value="">No data files found</option>';
		} else {
			const noneOpt = document.createElement('option');
			noneOpt.value = '';
			noneOpt.textContent = '(none - auto-detect)';
			dataSelect.appendChild(noneOpt);

			dataFiles.forEach(key => {
				const opt = document.createElement('option');
				opt.value = key;
				opt.textContent = key;
				dataSelect.appendChild(opt);
			});
			dataSelect.selectedIndex = dataSelect.options.length - 1;
		}

		document.getElementById('loadBtn').disabled = false;
		setStatus(`Found ${prefixes.length} session(s), ${dataFiles.length} data file(s)`);
	} catch (e) {
		sessionSelect.innerHTML = '<option value="">Error</option>';
		dataSelect.innerHTML = '<option value="">Error</option>';
		setStatus(`Error: ${e.message}`);
	}
}

// ─── Load session + data ─────────────────────────────────────────────────────

document.getElementById('loadBtn').addEventListener('click', loadSession);

async function loadSession() {
	const sessionId = document.getElementById('sessionSelect').value;
	if (!sessionId) return;

	showLoading('Converting session to video...');
	dataJson = null;

	try {
		showLoading('Converting canvas frames to MP4 (ffmpeg)...');
		const minioUrl = document.getElementById('minioUrl').value.replace(/\/+$/, '');

		const convertResp = await fetch('/convert', {
			method: 'POST',
			headers: { 'Content-Type': 'application/json' },
			body: JSON.stringify({ sessionId, minioUrl }),
		});

		if (!convertResp.ok) {
			const err = await convertResp.json().catch(() => ({ error: `HTTP ${convertResp.status}` }));
			throw new Error(err.error || `Conversion failed: ${convertResp.status}`);
		}

		const { videoUrl, frameCount, videoFrameCount, videoSizeBytes, manifest } = await convertResp.json();
		firstFrameOffsetSec = (manifest?.frames?.[0]?.time || 0) / 1000;

		showLoading('Loading video...');
		await new Promise((resolve, reject) => {
			video.oncanplay = () => { video.oncanplay = null; resolve(); };
			video.onerror = () => reject(new Error('Failed to load video'));
			video.src = videoUrl;
			video.load();
		});

		showLoading('Loading data.json...');
		const dataKey = document.getElementById('dataSelect').value;

		if (dataKey) {
			dataJson = await fetchDataJsonByKey(dataKey);
		} else {
			dataJson = await findDataJson(sessionId);
		}

		if (dataJson) {
			screenTimeline = dataJson.st || [];
			events = dataJson.evt || [];
			totalTimeMs = (dataJson.session?.tt || 0) * 1000;
			const sizeStr = videoSizeBytes ? ` | Video size: ${formatFileSize(videoSizeBytes)}` : '';
			setStatus(`Loaded: ${frameCount || '?'} frames → ${videoFrameCount || '?'} video frames, ${screenTimeline.length} screens, ${events.length} events${sizeStr}`);
		} else {
			screenTimeline = [];
			events = [];
			totalTimeMs = (video.duration || 0) * 1000;
			setStatus(`Loaded: video (${(video.duration || 0).toFixed(1)}s), no data.json found`);
		}

		if (totalTimeMs <= 0) {
			totalTimeMs = (video.duration || 0) * 1000;
		}

		setupPlayer();
		hideLoading();

	} catch (e) {
		hideLoading();
		setStatus(`Error: ${e.message}`);
		console.error(e);
	}
}

async function fetchDataJsonByKey(key) {
	const resp = await minioGet(key);
	const rawBuf = await resp.arrayBuffer();

	try {
		const ds = new DecompressionStream('gzip');
		const reader = new Blob([rawBuf]).stream().pipeThrough(ds).getReader();
		const chunks = [];
		while (true) {
			const { done, value } = await reader.read();
			if (done) break;
			chunks.push(value);
		}
		const text = new TextDecoder().decode(await new Blob(chunks).arrayBuffer());
		return JSON.parse(text);
	} catch {
		const text = new TextDecoder().decode(rawBuf);
		return JSON.parse(text);
	}
}

async function findDataJson(sessionId) {
	try {
		const xml = await minioList('', null);
		const allKeys = [...xml.querySelectorAll('Contents > Key')]
			.map(k => k.textContent)
			.filter(k => k.endsWith('data.json'));

		for (const key of allKeys) {
			if (key.includes(sessionId)) {
				const resp = await minioGet(key);
				return await resp.json();
			}
		}

		for (const key of allKeys) {
			try {
				const resp = await minioGet(key);
				const dj = await resp.json();
				if (dj.session?.id === sessionId) return dj;
			} catch { /* skip */ }
		}
	} catch { /* skip */ }
	return null;
}

// ─── Player setup ────────────────────────────────────────────────────────────

function setupPlayer() {
	video.currentTime = 0;
	video.pause();
	video.playbackRate = playbackSpeed;
	document.getElementById('playBtn').innerHTML = '&#9654;';

	buildTimeline();
	buildEventLog();
	updateTimeDisplay();
	updateOverlays();
	startOverlaySync();
}

function buildTimeline() {
	const wrap = document.getElementById('timelineWrap');
	wrap.querySelectorAll('.timeline-marker').forEach(m => m.remove());

	const duration = video.duration || 0;
	if (duration <= 0) return;

	events.forEach(evt => {
		const videoTime = sessionToVideo(evt.time);
		if (videoTime < 0 || videoTime > duration) return;
		const pct = (videoTime / duration) * 100;
		const m = document.createElement('div');
		m.className = 'timeline-marker';
		m.style.left = `${pct}%`;
		m.setAttribute('data-label', `${evt.name} @${evt.time.toFixed(1)}s`);
		wrap.appendChild(m);
	});

	screenTimeline.forEach(s => {
		const videoTime = sessionToVideo(s.at);
		if (videoTime < 0 || videoTime > duration) return;
		const pct = (videoTime / duration) * 100;
		const m = document.createElement('div');
		m.className = 'timeline-marker screen-marker';
		m.style.left = `${pct}%`;
		m.setAttribute('data-label', s.an);
		wrap.appendChild(m);
	});
}

function buildEventLog() {
	const log = document.getElementById('eventLog');
	log.innerHTML = '';

	const allEvents = events.slice().sort((a, b) => a.time - b.time);
	allEvents.forEach((evt, i) => {
		const div = document.createElement('div');
		div.className = 'event-item';
		div.id = `evt-${i}`;
		div.innerHTML = `
			<span class="time">${formatTime(evt.time)}</span>
			<span class="name ${evt.internal ? 'internal' : ''}">${escapeHtml(evt.name)}</span>
			<span class="screen">${escapeHtml(evt.screen || '')}</span>
		`;
		div.addEventListener('click', () => seekTo(sessionToVideo(evt.time)));
		log.appendChild(div);
	});
}

// ─── Playback ────────────────────────────────────────────────────────────────

function play() {
	video.play();
	document.getElementById('playBtn').innerHTML = '&#9646;&#9646;';
}

function pause() {
	video.pause();
	document.getElementById('playBtn').innerHTML = '&#9654;';
}

function sessionToVideo(sessionTimeSec) {
	return sessionTimeSec - firstFrameOffsetSec;
}

function videoToSession(videoTimeSec) {
	return videoTimeSec + firstFrameOffsetSec;
}

function seekTo(videoTimeSec) {
	video.currentTime = Math.max(0, Math.min(videoTimeSec, video.duration || 0));
	updateOverlays();
}

function startOverlaySync() {
	if (rafId) cancelAnimationFrame(rafId);

	function tick() {
		updateOverlays();
		rafId = requestAnimationFrame(tick);
	}
	rafId = requestAnimationFrame(tick);
}

function updateOverlays() {
	const sessionTimeSec = videoToSession(video.currentTime || 0);

	updateScreenBanner(sessionTimeSec);
	updateClickDots(sessionTimeSec);
	updateActiveEvents(sessionTimeSec);
	updateTimeDisplay();
	updateTimelinePosition();

	document.getElementById('frameInfo').textContent =
		`Time: ${(video.currentTime || 0).toFixed(1)}s / ${(video.duration || 0).toFixed(1)}s`;
}

// ─── Overlays ────────────────────────────────────────────────────────────────

function updateScreenBanner(timeSec) {
	const banner = document.getElementById('screenBanner');
	let current = null;

	for (let i = screenTimeline.length - 1; i >= 0; i--) {
		if (screenTimeline[i].at <= timeSec) {
			current = screenTimeline[i];
			break;
		}
	}

	banner.textContent = current ? current.an : 'No screen';
}

function updateClickDots(timeSec) {
	document.querySelectorAll('.click-dot').forEach(d => d.remove());
	document.querySelectorAll('.click-trail-svg').forEach(d => d.remove());

	const wrap = document.getElementById('canvasWrap');

	const TRAIL_WINDOW = 3;
	const allClicks = [];
	for (const screen of screenTimeline) {
		if (!screen.cor) continue;
		for (const click of screen.cor) {
			const ct = click[5];
			if (ct <= timeSec && ct >= timeSec - TRAIL_WINDOW) {
				allClicks.push({ x: click[0], y: click[1], time: ct });
			}
		}
	}
	allClicks.sort((a, b) => a.time - b.time);

	if (allClicks.length === 0) return;

	const videoRect = video.getBoundingClientRect();
	const wrapRect = wrap.getBoundingClientRect();
	const offsetX = videoRect.left - wrapRect.left;
	const offsetY = videoRect.top - wrapRect.top;
	const displayW = videoRect.width;
	const displayH = videoRect.height;

	const dpr = dataJson?.device?.dpi || window.devicePixelRatio || 1;
	const viewportW = (video.videoWidth || 1) / dpr;
	const viewportH = (video.videoHeight || 1) / dpr;

	function toScreen(cx, cy) {
		return {
			x: offsetX + (cx / viewportW) * displayW,
			y: offsetY + (cy / viewportH) * displayH,
		};
	}

	if (allClicks.length > 1) {
		const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
		svg.classList.add('click-trail-svg');
		svg.setAttribute('width', '100%');
		svg.setAttribute('height', '100%');
		wrap.appendChild(svg);

		for (let i = 1; i < allClicks.length; i++) {
			const prev = toScreen(allClicks[i - 1].x, allClicks[i - 1].y);
			const curr = toScreen(allClicks[i].x, allClicks[i].y);
			const age = (timeSec - allClicks[i].time) / TRAIL_WINDOW;
			const opacity = Math.max(0.1, 1 - age);

			const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
			line.setAttribute('x1', prev.x);
			line.setAttribute('y1', prev.y);
			line.setAttribute('x2', curr.x);
			line.setAttribute('y2', curr.y);
			line.setAttribute('stroke', `rgba(255, 150, 80, ${opacity * 0.6})`);
			line.setAttribute('stroke-width', '2');
			line.setAttribute('stroke-dasharray', '4 3');
			svg.appendChild(line);
		}
	}

	for (let i = 0; i < allClicks.length; i++) {
		const click = allClicks[i];
		const age = timeSec - click.time;
		const isCurrent = age < 0.3;
		const pos = toScreen(click.x, click.y);

		const dot = document.createElement('div');
		dot.className = `click-dot ${isCurrent ? 'current' : 'trail'}`;
		if (!isCurrent) {
			dot.style.opacity = Math.max(0.15, 1 - (age / TRAIL_WINDOW));
		}
		dot.style.left = `${pos.x}px`;
		dot.style.top = `${pos.y}px`;
		wrap.appendChild(dot);
	}
}

function updateActiveEvents(timeSec) {
	const sorted = events.slice().sort((a, b) => a.time - b.time);

	sorted.forEach((evt, i) => {
		const el = document.getElementById(`evt-${i}`);
		if (!el) return;

		const diff = Math.abs(timeSec - evt.time);
		if (diff < 0.2) {
			el.classList.add('active');
			el.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
		} else {
			el.classList.remove('active');
		}
	});
}

// ─── Timeline interaction ────────────────────────────────────────────────────

function updateTimelinePosition() {
	const duration = video.duration || 0;
	if (duration <= 0) return;
	const pct = ((video.currentTime || 0) / duration) * 100;
	document.getElementById('timelineProgress').style.width = `${pct}%`;
	document.getElementById('timelineThumb').style.left = `${pct}%`;
}

document.getElementById('timelineWrap').addEventListener('click', (e) => {
	const duration = video.duration || 0;
	if (duration <= 0) return;
	const rect = e.currentTarget.getBoundingClientRect();
	const pct = (e.clientX - rect.left) / rect.width;
	seekTo(pct * duration);
});

{
	const wrap = document.getElementById('timelineWrap');
	let dragging = false;

	wrap.addEventListener('mousedown', (e) => {
		dragging = true;
		const rect = wrap.getBoundingClientRect();
		const pct = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
		seekTo(pct * (video.duration || 0));
	});

	document.addEventListener('mousemove', (e) => {
		if (!dragging) return;
		const rect = wrap.getBoundingClientRect();
		const pct = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
		seekTo(pct * (video.duration || 0));
	});

	document.addEventListener('mouseup', () => { dragging = false; });
}

document.addEventListener('keydown', (e) => {
	if (e.target.tagName === 'INPUT') return;
	switch (e.code) {
		case 'Space':
			e.preventDefault();
			video.paused ? play() : pause();
			break;
		case 'ArrowLeft':
			e.preventDefault();
			seekTo(video.currentTime - 1);
			break;
		case 'ArrowRight':
			e.preventDefault();
			seekTo(video.currentTime + 1);
			break;
	}
});

document.getElementById('benchRunBtn').addEventListener('click', runBenchmark);

async function runBenchmark() {
	const sessionId = document.getElementById('benchSessionSelect').value;
	if (!sessionId) return;

	const minioUrl = document.getElementById('benchMinioUrl').value.replace(/\/+$/, '');
	const loadingEl = document.getElementById('benchLoading');
	const resultsEl = document.getElementById('benchResults');

	loadingEl.classList.remove('hidden');
	resultsEl.innerHTML = '';
	document.getElementById('benchRunBtn').disabled = true;
	document.getElementById('benchStatus').textContent = 'Running all strategies...';

	try {
		const resp = await fetch('/benchmark', {
			method: 'POST',
			headers: { 'Content-Type': 'application/json' },
			body: JSON.stringify({ sessionId, minioUrl }),
		});
		const data = await resp.json();

		if (!resp.ok) throw new Error(data.error || `HTTP ${resp.status}`);

		loadingEl.classList.add('hidden');
		renderBenchmarkResults(data.results);
		document.getElementById('benchStatus').textContent =
			`Benchmark complete: ${data.results.length} strategies compared`;
	} catch (e) {
		loadingEl.classList.add('hidden');
		document.getElementById('benchStatus').textContent = `Error: ${e.message}`;
	} finally {
		document.getElementById('benchRunBtn').disabled = false;
	}
}

function renderBenchmarkResults(results) {
	const container = document.getElementById('benchResults');

	const sizes = results.filter(r => r.videoSizeBytes).map(r => r.videoSizeBytes);
	const smallest = sizes.length > 0 ? Math.min(...sizes) : 0;

	let html = `<table class="bench-table">
		<thead><tr>
			<th>Strategy</th>
			<th>Encoding Time</th>
			<th>Video Size</th>
			<th>Source Frames</th>
			<th>Video Frames</th>
			<th>Preview</th>
		</tr></thead><tbody>`;

	for (const r of results) {
		const isBest = r.videoSizeBytes && r.videoSizeBytes === smallest;
		const rowClass = isBest ? ' class="best"' : '';

		const sizeCell = r.videoSizeBytes
			? `${formatFileSize(r.videoSizeBytes)}${isBest ? ' <span class="size-badge smallest">smallest</span>' : ''}`
			: 'N/A';

		const previewCell = r.videoUrl
			? `<video src="${escapeHtml(r.videoUrl)}" preload="metadata" controls></video>`
			: `<span class="bench-error">${escapeHtml(r.error || 'Failed')}</span>`;

		html += `<tr${rowClass}>
			<td>
				<div class="strategy-name">${escapeHtml(r.name || r.strategy || '?')}</div>
				<div class="strategy-desc">${escapeHtml(r.description || '')}</div>
			</td>
			<td>${r.encodingTimeMs != null ? (r.encodingTimeMs / 1000).toFixed(2) + 's' : 'N/A'}</td>
			<td>${sizeCell}</td>
			<td>${r.frameCount ?? 'N/A'}</td>
			<td>${r.videoFrameCount ?? 'N/A'}</td>
			<td class="bench-video-cell">${previewCell}</td>
		</tr>`;
	}

	html += '</tbody></table>';
	container.innerHTML = html;
}

function formatTime(sec) {
	const m = Math.floor(sec / 60);
	const s = (sec % 60).toFixed(1);
	return `${m}:${s.padStart(4, '0')}`;
}

function updateTimeDisplay() {
	const cur = video.currentTime || 0;
	const dur = video.duration || 0;
	document.getElementById('timeDisplay').textContent =
		`${formatTime(cur)} / ${formatTime(dur)}`;
}

function setStatus(text) {
	document.getElementById('statusText').textContent = text;
}

function showLoading(text) {
	document.getElementById('loadingOverlay').classList.remove('hidden');
	document.getElementById('loadingText').textContent = text;
}

function hideLoading() {
	document.getElementById('loadingOverlay').classList.add('hidden');
}

function formatFileSize(bytes) {
	if (bytes < 1024) return `${bytes} B`;
	if (bytes < 1024 * 1024) return `${(bytes / 1024).toFixed(1)} KB`;
	return `${(bytes / 1024 / 1024).toFixed(2)} MB`;
}

function escapeHtml(str) {
	const d = document.createElement('div');
	d.textContent = str;
	return d.innerHTML;
}

// ─── Convert & Play ──────────────────────────────────────────────────────────

document.getElementById('binLoadBtn').addEventListener('click', binLoadSession);

async function binLoadSession() {
	const sessionId = document.getElementById('binSessionSelect').value;
	if (!sessionId) return;

	const minioUrl = document.getElementById('binMinioUrl').value.replace(/\/+$/, '');
	const loadingEl = document.getElementById('binLoading');

	loadingEl.classList.remove('hidden');
	document.getElementById('binLoadingText').textContent = 'Converting with bin-processor (libx265 VFR)...';
	document.getElementById('binLoadBtn').disabled = true;
	binDataJson = null;

	try {
		// 1) Convert
		const resp = await fetch('/convert-bin', {
			method: 'POST',
			headers: { 'Content-Type': 'application/json' },
			body: JSON.stringify({ sessionId, minioUrl }),
		});
		const data = await resp.json();
		if (!resp.ok) throw new Error(data.error || `HTTP ${resp.status}`);

		binFirstFrameOffsetSec = 0;

		// 2) Load video
		document.getElementById('binLoadingText').textContent = 'Loading video...';
		await new Promise((resolve, reject) => {
			binVideo.oncanplay = () => { binVideo.oncanplay = null; resolve(); };
			binVideo.onerror = () => reject(new Error('Failed to load video'));
			binVideo.src = data.videoUrl;
			binVideo.load();
		});

		// 3) Load data.json
		document.getElementById('binLoadingText').textContent = 'Loading data.json...';
		const dataKey = document.getElementById('binDataSelect').value;

		if (dataKey) {
			binDataJson = await binFetchDataJson(dataKey);
		} else {
			binDataJson = await binFindDataJson(sessionId);
		}

		if (binDataJson) {
			binScreenTimeline = binDataJson.st || [];
			binEvents = binDataJson.evt || [];
			binTotalTimeMs = (binDataJson.session?.tt || 0) * 1000;
			const sizeStr = data.videoSizeBytes ? ` | ${formatFileSize(data.videoSizeBytes)}` : '';
			document.getElementById('binStatus').textContent =
				`${data.frameCount} frames, ${binScreenTimeline.length} screens, ${binEvents.length} events${sizeStr} (${(data.encodingTimeMs / 1000).toFixed(2)}s encode)`;
		} else {
			binScreenTimeline = [];
			binEvents = [];
			binTotalTimeMs = (binVideo.duration || 0) * 1000;
			document.getElementById('binStatus').textContent =
				`${data.frameCount} frames, ${formatFileSize(data.videoSizeBytes)} (${(data.encodingTimeMs / 1000).toFixed(2)}s encode), no data.json`;
		}

		if (binTotalTimeMs <= 0) binTotalTimeMs = (binVideo.duration || 0) * 1000;

		binSetupPlayer();
		loadingEl.classList.add('hidden');
	} catch (e) {
		loadingEl.classList.add('hidden');
		document.getElementById('binStatus').textContent = `Error: ${e.message}`;
		console.error(e);
	} finally {
		document.getElementById('binLoadBtn').disabled = false;
	}
}

// ─── data.json loading ───────────────────────────────────────────────────────

async function binFetchDataJson(key) {
	const resp = await minioGet(key, 'binMinioUrl');
	const rawBuf = await resp.arrayBuffer();
	try {
		const ds = new DecompressionStream('gzip');
		const reader = new Blob([rawBuf]).stream().pipeThrough(ds).getReader();
		const chunks = [];
		while (true) {
			const { done, value } = await reader.read();
			if (done) break;
			chunks.push(value);
		}
		const text = new TextDecoder().decode(await new Blob(chunks).arrayBuffer());
		return JSON.parse(text);
	} catch {
		const text = new TextDecoder().decode(rawBuf);
		return JSON.parse(text);
	}
}

async function binFindDataJson(sessionId) {
	try {
		const xml = await minioList('', null, 'binMinioUrl');
		const allKeys = [...xml.querySelectorAll('Contents > Key')]
			.map(k => k.textContent)
			.filter(k => k.endsWith('data.json'));

		for (const key of allKeys) {
			if (key.includes(sessionId)) {
				return await binFetchDataJson(key);
			}
		}

		for (const key of allKeys) {
			try {
				const dj = await binFetchDataJson(key);
				if (dj.session?.id === sessionId) return dj;
			} catch { /* skip */ }
		}
	} catch { /* skip */ }
	return null;
}

// ─── Player setup ────────────────────────────────────────────────────────────

function binSetupPlayer() {
	binVideo.currentTime = 0;
	binVideo.pause();
	binVideo.playbackRate = binPlaybackSpeed;
	document.getElementById('binPlayBtn').innerHTML = '&#9654;';

	binBuildTimeline();
	binBuildEventLog();
	binUpdateOverlays();
	binStartOverlaySync();
}

function binSessionToVideo(sessionTimeSec) {
	return sessionTimeSec - binFirstFrameOffsetSec;
}

function binVideoToSession(videoTimeSec) {
	return videoTimeSec + binFirstFrameOffsetSec;
}

function binSeekTo(videoTimeSec) {
	binVideo.currentTime = Math.max(0, Math.min(videoTimeSec, binVideo.duration || 0));
	binUpdateOverlays();
}

// ─── Timeline markers ────────────────────────────────────────────────────────

function binBuildTimeline() {
	const wrap = document.getElementById('binTimelineWrap');
	wrap.querySelectorAll('.timeline-marker').forEach(m => m.remove());

	const duration = binVideo.duration || 0;
	if (duration <= 0) return;

	binEvents.forEach(evt => {
		const videoTime = binSessionToVideo(evt.time);
		if (videoTime < 0 || videoTime > duration) return;
		const pct = (videoTime / duration) * 100;
		const m = document.createElement('div');
		m.className = 'timeline-marker';
		m.style.left = `${pct}%`;
		m.setAttribute('data-label', `${evt.name} @${evt.time.toFixed(1)}s`);
		wrap.appendChild(m);
	});

	binScreenTimeline.forEach(s => {
		const videoTime = binSessionToVideo(s.at);
		if (videoTime < 0 || videoTime > duration) return;
		const pct = (videoTime / duration) * 100;
		const m = document.createElement('div');
		m.className = 'timeline-marker screen-marker';
		m.style.left = `${pct}%`;
		m.setAttribute('data-label', s.an);
		wrap.appendChild(m);
	});
}

// ─── Event log sidebar ───────────────────────────────────────────────────────

function binBuildEventLog() {
	const log = document.getElementById('binEventLog');
	log.innerHTML = '';

	const allEvts = binEvents.slice().sort((a, b) => a.time - b.time);
	allEvts.forEach((evt, i) => {
		const div = document.createElement('div');
		div.className = 'event-item';
		div.id = `bin-evt-${i}`;
		div.innerHTML = `
			<span class="time">${formatTime(evt.time)}</span>
			<span class="name ${evt.internal ? 'internal' : ''}">${escapeHtml(evt.name)}</span>
			<span class="screen">${escapeHtml(evt.screen || '')}</span>
		`;
		div.addEventListener('click', () => binSeekTo(binSessionToVideo(evt.time)));
		log.appendChild(div);
	});
}

// ─── Overlay sync (RAF loop) ─────────────────────────────────────────────────

function binStartOverlaySync() {
	if (binRafId) cancelAnimationFrame(binRafId);
	function tick() {
		binUpdateOverlays();
		binRafId = requestAnimationFrame(tick);
	}
	binRafId = requestAnimationFrame(tick);
}

function binUpdateOverlays() {
	const sessionTimeSec = binVideoToSession(binVideo.currentTime || 0);

	binUpdateScreenBanner(sessionTimeSec);
	binUpdateClickDots(sessionTimeSec);
	binUpdateActiveEvents(sessionTimeSec);
	binUpdateTimeDisplay();
	binUpdateTimelinePosition();

	document.getElementById('binFrameInfo').textContent =
		`Time: ${(binVideo.currentTime || 0).toFixed(1)}s / ${(binVideo.duration || 0).toFixed(1)}s`;
}

// ─── Screen banner ───────────────────────────────────────────────────────────

function binUpdateScreenBanner(timeSec) {
	const banner = document.getElementById('binBanner');
	let current = null;
	for (let i = binScreenTimeline.length - 1; i >= 0; i--) {
		if (binScreenTimeline[i].at <= timeSec) {
			current = binScreenTimeline[i];
			break;
		}
	}
	banner.textContent = current ? current.an : 'No screen';
}

// ─── Click dots + trails ─────────────────────────────────────────────────────

function binUpdateClickDots(timeSec) {
	document.querySelectorAll('#binCanvasWrap .click-dot').forEach(d => d.remove());
	document.querySelectorAll('#binCanvasWrap .click-trail-svg').forEach(d => d.remove());

	const wrap = document.getElementById('binCanvasWrap');
	const TRAIL_WINDOW = 3;
	const allClicks = [];

	for (const screen of binScreenTimeline) {
		if (!screen.cor) continue;
		for (const click of screen.cor) {
			const ct = click[5];
			if (ct <= timeSec && ct >= timeSec - TRAIL_WINDOW) {
				allClicks.push({ x: click[0], y: click[1], time: ct });
			}
		}
	}
	allClicks.sort((a, b) => a.time - b.time);
	if (allClicks.length === 0) return;

	const videoRect = binVideo.getBoundingClientRect();
	const wrapRect = wrap.getBoundingClientRect();
	const offsetX = videoRect.left - wrapRect.left;
	const offsetY = videoRect.top - wrapRect.top;
	const displayW = videoRect.width;
	const displayH = videoRect.height;

	const dpr = binDataJson?.device?.dpi || window.devicePixelRatio || 1;
	const viewportW = (binVideo.videoWidth || 1) / dpr;
	const viewportH = (binVideo.videoHeight || 1) / dpr;

	function toScreen(cx, cy) {
		return {
			x: offsetX + (cx / viewportW) * displayW,
			y: offsetY + (cy / viewportH) * displayH,
		};
	}

	if (allClicks.length > 1) {
		const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
		svg.classList.add('click-trail-svg');
		svg.setAttribute('width', '100%');
		svg.setAttribute('height', '100%');
		wrap.appendChild(svg);

		for (let i = 1; i < allClicks.length; i++) {
			const prev = toScreen(allClicks[i - 1].x, allClicks[i - 1].y);
			const curr = toScreen(allClicks[i].x, allClicks[i].y);
			const age = (timeSec - allClicks[i].time) / TRAIL_WINDOW;
			const opacity = Math.max(0.1, 1 - age);

			const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
			line.setAttribute('x1', prev.x);
			line.setAttribute('y1', prev.y);
			line.setAttribute('x2', curr.x);
			line.setAttribute('y2', curr.y);
			line.setAttribute('stroke', `rgba(255, 150, 80, ${opacity * 0.6})`);
			line.setAttribute('stroke-width', '2');
			line.setAttribute('stroke-dasharray', '4 3');
			svg.appendChild(line);
		}
	}

	for (let i = 0; i < allClicks.length; i++) {
		const click = allClicks[i];
		const age = timeSec - click.time;
		const isCurrent = age < 0.3;
		const pos = toScreen(click.x, click.y);

		const dot = document.createElement('div');
		dot.className = `click-dot ${isCurrent ? 'current' : 'trail'}`;
		if (!isCurrent) dot.style.opacity = Math.max(0.15, 1 - (age / TRAIL_WINDOW));
		dot.style.left = `${pos.x}px`;
		dot.style.top = `${pos.y}px`;
		wrap.appendChild(dot);
	}
}

// ─── Active event highlight ──────────────────────────────────────────────────

function binUpdateActiveEvents(timeSec) {
	const sorted = binEvents.slice().sort((a, b) => a.time - b.time);
	sorted.forEach((evt, i) => {
		const el = document.getElementById(`bin-evt-${i}`);
		if (!el) return;
		const diff = Math.abs(timeSec - evt.time);
		if (diff < 0.2) {
			el.classList.add('active');
			el.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
		} else {
			el.classList.remove('active');
		}
	});
}

// ─── Time display + timeline position ────────────────────────────────────────

function binUpdateTimeDisplay() {
	const cur = binVideo.currentTime || 0;
	const dur = binVideo.duration || 0;
	document.getElementById('binTimeDisplay').textContent = `${formatTime(cur)} / ${formatTime(dur)}`;
}

function binUpdateTimelinePosition() {
	const duration = binVideo.duration || 0;
	if (duration <= 0) return;
	const pct = ((binVideo.currentTime || 0) / duration) * 100;
	document.getElementById('binTimelineProgress').style.width = `${pct}%`;
	document.getElementById('binTimelineThumb').style.left = `${pct}%`;
}

// ─── Playback controls ──────────────────────────────────────────────────────

document.getElementById('binPlayBtn').addEventListener('click', () => {
	binVideo.paused ? binVideo.play() : binVideo.pause();
});

binVideo.addEventListener('play', () => {
	document.getElementById('binPlayBtn').innerHTML = '&#9646;&#9646;';
});
binVideo.addEventListener('pause', () => {
	document.getElementById('binPlayBtn').innerHTML = '&#9654;';
});
binVideo.addEventListener('ended', () => {
	document.getElementById('binPlayBtn').innerHTML = '&#9654;';
});

document.querySelectorAll('.bin-speed').forEach(el => {
	el.addEventListener('click', () => {
		document.querySelectorAll('.bin-speed').forEach(s => s.classList.remove('active'));
		el.classList.add('active');
		binPlaybackSpeed = parseFloat(el.dataset.speed);
		binVideo.playbackRate = binPlaybackSpeed;
	});
});

document.getElementById('binTimelineWrap').addEventListener('click', (e) => {
	const dur = binVideo.duration || 0;
	if (dur <= 0) return;
	const rect = e.currentTarget.getBoundingClientRect();
	const pct = (e.clientX - rect.left) / rect.width;
	binSeekTo(pct * dur);
});

{
	const wrap = document.getElementById('binTimelineWrap');
	let dragging = false;
	wrap.addEventListener('mousedown', (e) => {
		dragging = true;
		const rect = wrap.getBoundingClientRect();
		const pct = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
		binSeekTo(pct * (binVideo.duration || 0));
	});
	document.addEventListener('mousemove', (e) => {
		if (!dragging) return;
		const rect = wrap.getBoundingClientRect();
		const pct = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
		binSeekTo(pct * (binVideo.duration || 0));
	});
	document.addEventListener('mouseup', () => { dragging = false; });
}

// ─── Init ────────────────────────────────────────────────────────────────────

hideLoading();
setStatus('Click "List" to start. Requires server: node server.mjs');
</script>
