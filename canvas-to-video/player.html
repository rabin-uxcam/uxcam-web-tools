<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Canvas Session Player</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, monospace; background: #1a1a2e; color: #e0e0e0; height: 100vh; display: flex; flex-direction: column; }

/* Header */
.header { display: flex; align-items: center; gap: 10px; padding: 10px 16px; background: #16213e; border-bottom: 1px solid #0f3460; flex-wrap: wrap; }
.header label { font-size: 13px; color: #aaa; }
.header select, .header input { background: #1a1a2e; color: #e0e0e0; border: 1px solid #0f3460; border-radius: 4px; padding: 6px 10px; font-size: 13px; }
.header select { min-width: 200px; }
.header input { width: 280px; }
.header button { background: #0f3460; color: #e0e0e0; border: none; border-radius: 4px; padding: 6px 16px; font-size: 13px; cursor: pointer; }
.header button:hover { background: #1a5276; }
.header .status { margin-left: auto; font-size: 12px; color: #888; }

/* Main area */
.main { flex: 1; display: flex; overflow: hidden; }

/* Video area */
.canvas-wrap { flex: 1; position: relative; display: flex; align-items: center; justify-content: center; background: #111; overflow: hidden; }
#playerVideo { max-width: 100%; max-height: 100%; object-fit: contain; background: #000; }
.click-dot { position: absolute; width: 20px; height: 20px; border-radius: 50%; background: rgba(255, 80, 80, 0.8); border: 2px solid #ff5050; pointer-events: none; transform: translate(-50%, -50%); z-index: 2; }
.click-dot.current { animation: clickPulse 0.5s ease-out forwards; }
.click-dot.trail { opacity: 0.4; width: 12px; height: 12px; background: rgba(255, 150, 80, 0.5); border-color: #ff9650; }
@keyframes clickPulse {
  0% { transform: translate(-50%, -50%) scale(0.5); opacity: 1; }
  100% { transform: translate(-50%, -50%) scale(2.2); opacity: 0; }
}
.click-trail-svg { position: absolute; inset: 0; pointer-events: none; z-index: 1; }

/* Screen banner */
.screen-banner { position: absolute; top: 10px; left: 10px; background: rgba(15, 52, 96, 0.85); padding: 6px 14px; border-radius: 4px; font-size: 13px; font-weight: 600; max-width: 60%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

/* Sidebar */
.sidebar { width: 320px; display: flex; flex-direction: column; border-left: 1px solid #0f3460; background: #16213e; }
.sidebar-title { padding: 10px 14px; font-size: 12px; font-weight: 600; text-transform: uppercase; color: #888; border-bottom: 1px solid #0f3460; }
.event-log { flex: 1; overflow-y: auto; font-size: 12px; }
.event-item { padding: 6px 14px; border-bottom: 1px solid #0f3460; display: flex; gap: 8px; }
.event-item.active { background: rgba(255, 200, 50, 0.1); }
.event-item .time { color: #5dade2; min-width: 50px; }
.event-item .screen { color: #888; font-size: 11px; }
.event-item .name { color: #e0e0e0; }
.event-item .name.internal { color: #888; }

/* Controls */
.controls { background: #16213e; border-top: 1px solid #0f3460; padding: 10px 16px; }
.controls-row { display: flex; align-items: center; gap: 12px; }
.controls button { background: none; border: 1px solid #0f3460; color: #e0e0e0; border-radius: 4px; padding: 6px 12px; cursor: pointer; font-size: 14px; }
.controls button:hover { background: #0f3460; }
.controls .time-display { font-size: 13px; color: #aaa; min-width: 120px; text-align: center; }
.controls .speed { font-size: 12px; color: #5dade2; cursor: pointer; padding: 4px 8px; border-radius: 3px; }
.controls .speed:hover { background: #0f3460; }
.controls .speed.active { background: #0f3460; font-weight: 600; }

/* Timeline */
.timeline-wrap { margin-top: 8px; position: relative; height: 28px; cursor: pointer; }
.timeline-bar { position: absolute; top: 10px; left: 0; right: 0; height: 6px; background: #0f3460; border-radius: 3px; }
.timeline-progress { position: absolute; top: 10px; left: 0; height: 6px; background: #5dade2; border-radius: 3px; }
.timeline-thumb { position: absolute; top: 6px; width: 14px; height: 14px; background: #e0e0e0; border-radius: 50%; transform: translateX(-50%); }
.timeline-marker { position: absolute; top: 0; width: 2px; height: 8px; background: #f39c12; transform: translateX(-50%); border-radius: 1px; }
.timeline-marker.screen-marker { background: #2ecc71; height: 8px; top: 18px; }
.timeline-marker:hover::after { content: attr(data-label); position: absolute; bottom: 12px; left: 50%; transform: translateX(-50%); background: #333; color: #fff; padding: 2px 6px; border-radius: 3px; font-size: 10px; white-space: nowrap; z-index: 10; }
.timeline-marker.screen-marker:hover::after { bottom: auto; top: 12px; }

/* Loading overlay */
.loading { position: absolute; inset: 0; background: rgba(0,0,0,0.8); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; z-index: 100; }
.loading.hidden { display: none; }
.loading .spinner { width: 40px; height: 40px; border: 3px solid #333; border-top-color: #5dade2; border-radius: 50%; animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.loading .progress-text { font-size: 13px; color: #aaa; }
</style>
</head>
<body>

<div class="header">
	<label>MinIO:</label>
	<input type="text" id="minioUrl" value="http://localhost:9000" placeholder="MinIO endpoint">
	<button id="listBtn">List</button>
	<label>Session:</label>
	<select id="sessionSelect"><option value="">-- click List --</option></select>
	<label>data.json:</label>
	<select id="dataSelect"><option value="">-- click List --</option></select>
	<button id="loadBtn" disabled>Load</button>
	<span class="status" id="statusText"></span>
</div>

<div class="main">
	<div class="canvas-wrap" id="canvasWrap">
		<video id="playerVideo" preload="auto" playsinline></video>
		<div class="screen-banner" id="screenBanner">No session loaded</div>
		<div class="loading" id="loadingOverlay">
			<div class="spinner"></div>
			<div class="progress-text" id="loadingText">Loading...</div>
		</div>
	</div>
	<div class="sidebar">
		<div class="sidebar-title">Events</div>
		<div class="event-log" id="eventLog"></div>
	</div>
</div>

<div class="controls">
	<div class="controls-row">
		<button id="playBtn" title="Space">&#9654;</button>
		<span class="time-display" id="timeDisplay">0:00.0 / 0:00.0</span>
		<span class="speed" data-speed="0.5">0.5x</span>
		<span class="speed active" data-speed="1">1x</span>
		<span class="speed" data-speed="2">2x</span>
		<span class="speed" data-speed="4">4x</span>
		<span style="flex:1"></span>
		<span id="frameInfo" style="font-size:12px;color:#888;"></span>
	</div>
	<div class="timeline-wrap" id="timelineWrap">
		<div class="timeline-bar"></div>
		<div class="timeline-progress" id="timelineProgress"></div>
		<div class="timeline-thumb" id="timelineThumb"></div>
	</div>
</div>

<script>
// ─── State ───────────────────────────────────────────────────────────────────

let dataJson = null;
let screenTimeline = [];	// st[]
let events = [];		// evt[]
let totalTimeMs = 0;
let playbackSpeed = 1;
let rafId = null;

const video = document.getElementById('playerVideo');
const MINIO_BUCKET = 'uxcam-sessions';

// Detect if served from the dev server (has /convert endpoint) or opened as file
const isDevServer = location.protocol.startsWith('http');

// ─── MinIO helpers (proxy through server to avoid CORS) ─────────────────────

function minioBase() {
	const raw = document.getElementById('minioUrl').value.replace(/\/+$/, '');
	if (!isDevServer) return raw;
	// Proxy through server: http://localhost:9000 → /minio/localhost:9000
	try {
		const u = new URL(raw);
		return `/minio/${u.host}`;
	} catch {
		return raw;
	}
}

async function minioList(prefix, delimiter) {
	let url = `${minioBase()}/${MINIO_BUCKET}?list-type=2&prefix=${encodeURIComponent(prefix)}`;
	if (delimiter) url += `&delimiter=${encodeURIComponent(delimiter)}`;
	const resp = await fetch(url);
	const text = await resp.text();
	const parser = new DOMParser();
	return parser.parseFromString(text, 'application/xml');
}

async function minioGet(key) {
	const resp = await fetch(`${minioBase()}/${MINIO_BUCKET}/${key}`);
	if (!resp.ok) throw new Error(`Failed to fetch ${key}: ${resp.status}`);
	return resp;
}

// ─── List everything from MinIO ──────────────────────────────────────────────

document.getElementById('listBtn').addEventListener('click', listAll);

async function listAll() {
	const sessionSelect = document.getElementById('sessionSelect');
	const dataSelect = document.getElementById('dataSelect');
	sessionSelect.innerHTML = '<option value="">Loading...</option>';
	dataSelect.innerHTML = '<option value="">Loading...</option>';
	setStatus('Listing MinIO contents...');

	try {
		// List canvas sessions
		const canvasXml = await minioList('sessions/canvas/', '/');
		const prefixes = [...canvasXml.querySelectorAll('CommonPrefixes > Prefix')];
		sessionSelect.innerHTML = '';

		if (prefixes.length === 0) {
			sessionSelect.innerHTML = '<option value="">No sessions found</option>';
		} else {
			prefixes.forEach(p => {
				const sid = p.textContent.replace('sessions/canvas/', '').replace(/\/$/, '');
				const opt = document.createElement('option');
				opt.value = sid;
				opt.textContent = sid;
				sessionSelect.appendChild(opt);
			});
			sessionSelect.selectedIndex = sessionSelect.options.length - 1;
		}

		// List data.json files from sessions/data/ prefix
		const dataXml = await minioList('sessions/data/', null);
		const allKeys = [...dataXml.querySelectorAll('Contents > Key')].map(k => k.textContent);
		const dataFiles = allKeys.filter(k => k.endsWith('.json') || k.endsWith('.json.gz'));
		dataSelect.innerHTML = '';

		if (dataFiles.length === 0) {
			dataSelect.innerHTML = '<option value="">No data files found</option>';
		} else {
			const noneOpt = document.createElement('option');
			noneOpt.value = '';
			noneOpt.textContent = '(none - auto-detect)';
			dataSelect.appendChild(noneOpt);

			dataFiles.forEach(key => {
				const opt = document.createElement('option');
				opt.value = key;
				opt.textContent = key;
				dataSelect.appendChild(opt);
			});
			// Auto-select last data file
			dataSelect.selectedIndex = dataSelect.options.length - 1;
		}

		document.getElementById('loadBtn').disabled = false;
		setStatus(`Found ${prefixes.length} session(s), ${dataFiles.length} data file(s)`);
	} catch (e) {
		sessionSelect.innerHTML = '<option value="">Error</option>';
		dataSelect.innerHTML = '<option value="">Error</option>';
		setStatus(`Error: ${e.message}`);
	}
}

// ─── Load session + data ─────────────────────────────────────────────────────

document.getElementById('loadBtn').addEventListener('click', loadSession);

async function loadSession() {
	const sessionId = document.getElementById('sessionSelect').value;
	if (!sessionId) return;

	showLoading('Converting session to video...');
	dataJson = null;

	try {
		// 1. Call server to convert batches → MP4 via ffmpeg
		showLoading('Converting canvas frames to MP4 (ffmpeg)...');
		const minioUrl = document.getElementById('minioUrl').value.replace(/\/+$/, '');

		const convertResp = await fetch('/convert', {
			method: 'POST',
			headers: { 'Content-Type': 'application/json' },
			body: JSON.stringify({ sessionId, minioUrl }),
		});

		if (!convertResp.ok) {
			const err = await convertResp.json().catch(() => ({ error: `HTTP ${convertResp.status}` }));
			throw new Error(err.error || `Conversion failed: ${convertResp.status}`);
		}

		const { videoUrl, frameCount, videoFrameCount, videoSizeBytes } = await convertResp.json();

		// 2. Load video
		showLoading('Loading video...');
		await new Promise((resolve, reject) => {
			video.oncanplay = () => { video.oncanplay = null; resolve(); };
			video.onerror = () => reject(new Error('Failed to load video'));
			video.src = videoUrl;
			video.load();
		});

		// 3. Load data.json
		showLoading('Loading data.json...');
		const dataKey = document.getElementById('dataSelect').value;

		if (dataKey) {
			dataJson = await fetchDataJsonByKey(dataKey);
		} else {
			dataJson = await findDataJson(sessionId);
		}

		if (dataJson) {
			screenTimeline = dataJson.st || [];
			events = dataJson.evt || [];
			totalTimeMs = (dataJson.session?.tt || 0) * 1000;
			const sizeStr = videoSizeBytes ? ` | Video size: ${formatFileSize(videoSizeBytes)}` : '';
			setStatus(`Loaded: ${frameCount || '?'} frames → ${videoFrameCount || '?'} video frames, ${screenTimeline.length} screens, ${events.length} events${sizeStr}`);
		} else {
			screenTimeline = [];
			events = [];
			totalTimeMs = (video.duration || 0) * 1000;
			setStatus(`Loaded: video (${(video.duration || 0).toFixed(1)}s), no data.json found`);
		}

		// If data.json didn't provide totalTimeMs, use video duration
		if (totalTimeMs <= 0) {
			totalTimeMs = (video.duration || 0) * 1000;
		}

		// 4. Setup player
		setupPlayer();
		hideLoading();

	} catch (e) {
		hideLoading();
		setStatus(`Error: ${e.message}`);
		console.error(e);
	}
}

async function fetchDataJsonByKey(key) {
	const resp = await minioGet(key);
	const rawBuf = await resp.arrayBuffer();

	// Try gzip first, fall back to plain JSON
	try {
		const ds = new DecompressionStream('gzip');
		const reader = new Blob([rawBuf]).stream().pipeThrough(ds).getReader();
		const chunks = [];
		while (true) {
			const { done, value } = await reader.read();
			if (done) break;
			chunks.push(value);
		}
		const text = new TextDecoder().decode(await new Blob(chunks).arrayBuffer());
		return JSON.parse(text);
	} catch {
		const text = new TextDecoder().decode(rawBuf);
		return JSON.parse(text);
	}
}

async function findDataJson(sessionId) {
	try {
		const xml = await minioList('', null);
		const allKeys = [...xml.querySelectorAll('Contents > Key')]
			.map(k => k.textContent)
			.filter(k => k.endsWith('data.json'));

		for (const key of allKeys) {
			if (key.includes(sessionId)) {
				const resp = await minioGet(key);
				return await resp.json();
			}
		}

		for (const key of allKeys) {
			try {
				const resp = await minioGet(key);
				const dj = await resp.json();
				if (dj.session?.id === sessionId) return dj;
			} catch { /* skip */ }
		}
	} catch { /* skip */ }
	return null;
}

// ─── Player setup ────────────────────────────────────────────────────────────

function setupPlayer() {
	video.currentTime = 0;
	video.pause();
	video.playbackRate = playbackSpeed;
	document.getElementById('playBtn').innerHTML = '&#9654;';

	// Build timeline markers
	buildTimeline();

	// Build event log
	buildEventLog();

	// Update display
	updateTimeDisplay();
	updateOverlays();

	// Start overlay sync loop
	startOverlaySync();
}

function buildTimeline() {
	const wrap = document.getElementById('timelineWrap');
	// Remove old markers
	wrap.querySelectorAll('.timeline-marker').forEach(m => m.remove());

	if (totalTimeMs <= 0) return;

	// Event markers (orange)
	events.forEach(evt => {
		const pct = (evt.time * 1000 / totalTimeMs) * 100;
		const m = document.createElement('div');
		m.className = 'timeline-marker';
		m.style.left = `${pct}%`;
		m.setAttribute('data-label', `${evt.name} @${evt.time.toFixed(1)}s`);
		wrap.appendChild(m);
	});

	// Screen transition markers (green)
	screenTimeline.forEach(s => {
		const pct = (s.at * 1000 / totalTimeMs) * 100;
		const m = document.createElement('div');
		m.className = 'timeline-marker screen-marker';
		m.style.left = `${pct}%`;
		m.setAttribute('data-label', s.an);
		wrap.appendChild(m);
	});
}

function buildEventLog() {
	const log = document.getElementById('eventLog');
	log.innerHTML = '';

	const allEvents = events.slice().sort((a, b) => a.time - b.time);
	allEvents.forEach((evt, i) => {
		const div = document.createElement('div');
		div.className = 'event-item';
		div.id = `evt-${i}`;
		div.innerHTML = `
			<span class="time">${formatTime(evt.time)}</span>
			<span class="name ${evt.internal ? 'internal' : ''}">${escapeHtml(evt.name)}</span>
			<span class="screen">${escapeHtml(evt.screen || '')}</span>
		`;
		div.addEventListener('click', () => seekTo(evt.time));
		log.appendChild(div);
	});
}

// ─── Playback (via <video> element) ──────────────────────────────────────────

function play() {
	video.play();
	document.getElementById('playBtn').innerHTML = '&#9646;&#9646;';
}

function pause() {
	video.pause();
	document.getElementById('playBtn').innerHTML = '&#9654;';
}

function seekTo(timeSec) {
	video.currentTime = Math.max(0, Math.min(timeSec, video.duration || 0));
	updateOverlays();
}

// Sync overlays with video playback using requestAnimationFrame
function startOverlaySync() {
	if (rafId) cancelAnimationFrame(rafId);

	function tick() {
		updateOverlays();
		rafId = requestAnimationFrame(tick);
	}
	rafId = requestAnimationFrame(tick);
}

function updateOverlays() {
	const currentTimeSec = video.currentTime || 0;
	const currentTimeMs = currentTimeSec * 1000;

	// Update screen banner
	updateScreenBanner(currentTimeSec);

	// Show click dots
	updateClickDots(currentTimeSec);

	// Highlight active events
	updateActiveEvents(currentTimeSec);

	// Update timeline position
	updateTimeDisplay();
	updateTimelinePosition();

	// Frame info
	document.getElementById('frameInfo').textContent =
		`Time: ${currentTimeSec.toFixed(1)}s / ${(video.duration || 0).toFixed(1)}s`;
}

// ─── Overlays ────────────────────────────────────────────────────────────────

function updateScreenBanner(timeSec) {
	const banner = document.getElementById('screenBanner');
	let current = null;

	for (let i = screenTimeline.length - 1; i >= 0; i--) {
		if (screenTimeline[i].at <= timeSec) {
			current = screenTimeline[i];
			break;
		}
	}

	banner.textContent = current ? current.an : 'No screen';
}

function updateClickDots(timeSec) {
	// Remove old dots and trail SVG
	document.querySelectorAll('.click-dot').forEach(d => d.remove());
	document.querySelectorAll('.click-trail-svg').forEach(d => d.remove());

	const wrap = document.getElementById('canvasWrap');

	// Collect all clicks across all screens up to current time, sorted by time
	const TRAIL_WINDOW = 3; // show clicks from last 3 seconds
	const allClicks = [];
	for (const screen of screenTimeline) {
		if (!screen.cor) continue;
		for (const click of screen.cor) {
			const ct = click[5]; // seconds
			if (ct <= timeSec && ct >= timeSec - TRAIL_WINDOW) {
				allClicks.push({ x: click[0], y: click[1], time: ct });
			}
		}
	}
	allClicks.sort((a, b) => a.time - b.time);

	if (allClicks.length === 0) return;

	// Get video display size and position relative to wrapper
	const videoRect = video.getBoundingClientRect();
	const wrapRect = wrap.getBoundingClientRect();
	const offsetX = videoRect.left - wrapRect.left;
	const offsetY = videoRect.top - wrapRect.top;
	const displayW = videoRect.width;
	const displayH = videoRect.height;

	// Click x,y are in CSS viewport pixels (clientX/clientY at record time).
	// Video dimensions are in device pixels (scaled by DPR).
	const dpr = dataJson?.device?.dpi || window.devicePixelRatio || 1;
	const viewportW = (video.videoWidth || 1) / dpr;
	const viewportH = (video.videoHeight || 1) / dpr;

	function toScreen(cx, cy) {
		return {
			x: offsetX + (cx / viewportW) * displayW,
			y: offsetY + (cy / viewportH) * displayH,
		};
	}

	// Draw trail line connecting clicks
	if (allClicks.length > 1) {
		const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
		svg.classList.add('click-trail-svg');
		svg.setAttribute('width', '100%');
		svg.setAttribute('height', '100%');
		wrap.appendChild(svg);

		for (let i = 1; i < allClicks.length; i++) {
			const prev = toScreen(allClicks[i - 1].x, allClicks[i - 1].y);
			const curr = toScreen(allClicks[i].x, allClicks[i].y);
			const age = (timeSec - allClicks[i].time) / TRAIL_WINDOW;
			const opacity = Math.max(0.1, 1 - age);

			const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
			line.setAttribute('x1', prev.x);
			line.setAttribute('y1', prev.y);
			line.setAttribute('x2', curr.x);
			line.setAttribute('y2', curr.y);
			line.setAttribute('stroke', `rgba(255, 150, 80, ${opacity * 0.6})`);
			line.setAttribute('stroke-width', '2');
			line.setAttribute('stroke-dasharray', '4 3');
			svg.appendChild(line);
		}
	}

	// Draw dots
	for (let i = 0; i < allClicks.length; i++) {
		const click = allClicks[i];
		const age = timeSec - click.time;
		const isCurrent = age < 0.3;
		const pos = toScreen(click.x, click.y);

		const dot = document.createElement('div');
		dot.className = `click-dot ${isCurrent ? 'current' : 'trail'}`;
		if (!isCurrent) {
			dot.style.opacity = Math.max(0.15, 1 - (age / TRAIL_WINDOW));
		}
		dot.style.left = `${pos.x}px`;
		dot.style.top = `${pos.y}px`;
		wrap.appendChild(dot);
	}
}

function updateActiveEvents(timeSec) {
	const sorted = events.slice().sort((a, b) => a.time - b.time);

	sorted.forEach((evt, i) => {
		const el = document.getElementById(`evt-${i}`);
		if (!el) return;

		const diff = Math.abs(timeSec - evt.time);
		if (diff < 0.2) {
			el.classList.add('active');
			el.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
		} else {
			el.classList.remove('active');
		}
	});
}

// ─── Timeline interaction ────────────────────────────────────────────────────

function updateTimelinePosition() {
	const duration = video.duration || 0;
	if (duration <= 0) return;
	const pct = ((video.currentTime || 0) / duration) * 100;
	document.getElementById('timelineProgress').style.width = `${pct}%`;
	document.getElementById('timelineThumb').style.left = `${pct}%`;
}

document.getElementById('timelineWrap').addEventListener('click', (e) => {
	const duration = video.duration || 0;
	if (duration <= 0) return;
	const rect = e.currentTarget.getBoundingClientRect();
	const pct = (e.clientX - rect.left) / rect.width;
	seekTo(pct * duration);
});

// Drag support for timeline thumb
{
	const wrap = document.getElementById('timelineWrap');
	let dragging = false;

	wrap.addEventListener('mousedown', (e) => {
		dragging = true;
		const rect = wrap.getBoundingClientRect();
		const pct = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
		seekTo(pct * (video.duration || 0));
	});

	document.addEventListener('mousemove', (e) => {
		if (!dragging) return;
		const rect = wrap.getBoundingClientRect();
		const pct = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
		seekTo(pct * (video.duration || 0));
	});

	document.addEventListener('mouseup', () => { dragging = false; });
}

// ─── Controls ────────────────────────────────────────────────────────────────

document.getElementById('playBtn').addEventListener('click', () => {
	video.paused ? play() : pause();
});

// Sync play/pause button with video state
video.addEventListener('play', () => {
	document.getElementById('playBtn').innerHTML = '&#9646;&#9646;';
});
video.addEventListener('pause', () => {
	document.getElementById('playBtn').innerHTML = '&#9654;';
});
video.addEventListener('ended', () => {
	document.getElementById('playBtn').innerHTML = '&#9654;';
});

document.querySelectorAll('.speed').forEach(el => {
	el.addEventListener('click', () => {
		document.querySelectorAll('.speed').forEach(s => s.classList.remove('active'));
		el.classList.add('active');
		playbackSpeed = parseFloat(el.dataset.speed);
		video.playbackRate = playbackSpeed;
	});
});

// Keyboard
document.addEventListener('keydown', (e) => {
	if (e.target.tagName === 'INPUT') return;
	switch (e.code) {
		case 'Space':
			e.preventDefault();
			video.paused ? play() : pause();
			break;
		case 'ArrowLeft':
			e.preventDefault();
			seekTo(video.currentTime - 1);
			break;
		case 'ArrowRight':
			e.preventDefault();
			seekTo(video.currentTime + 1);
			break;
	}
});

// ─── Helpers ─────────────────────────────────────────────────────────────────

function formatTime(sec) {
	const m = Math.floor(sec / 60);
	const s = (sec % 60).toFixed(1);
	return `${m}:${s.padStart(4, '0')}`;
}

function updateTimeDisplay() {
	const cur = video.currentTime || 0;
	const dur = video.duration || 0;
	document.getElementById('timeDisplay').textContent =
		`${formatTime(cur)} / ${formatTime(dur)}`;
}

function setStatus(text) {
	document.getElementById('statusText').textContent = text;
}

function showLoading(text) {
	document.getElementById('loadingOverlay').classList.remove('hidden');
	document.getElementById('loadingText').textContent = text;
}

function hideLoading() {
	document.getElementById('loadingOverlay').classList.add('hidden');
}

function formatFileSize(bytes) {
	if (bytes < 1024) return `${bytes} B`;
	if (bytes < 1024 * 1024) return `${(bytes / 1024).toFixed(1)} KB`;
	return `${(bytes / 1024 / 1024).toFixed(2)} MB`;
}

function escapeHtml(str) {
	const d = document.createElement('div');
	d.textContent = str;
	return d.innerHTML;
}

// ─── Init ────────────────────────────────────────────────────────────────────

hideLoading();
setStatus('Click "List" to start. Requires server: node server.mjs');
</script>
